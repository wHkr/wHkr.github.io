<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Made with love.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakeology</title>

  <link rel="stylesheet" href="css/style.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="hero">
  <h1>Sweet Crumbs Bakery</h1>
  <p>Custom cakes & desserts made with love</p>
  <a href="#contact" class="btn">Order Now</a>
</header>

<section class="about">
  <h2>About</h2>
  <p>Handcrafted cakes, cupcakes, and desserts for every occasion.</p>
</section>

<section class="menu">
  <h2>Menu</h2>
  <div class="grid">
    <div class="card">Cakes</div>
    <div class="card">Cupcakes</div>
    <div class="card">Custom Orders</div>
  </div>
</section>

<section class="gallery">
  <h2>Gallery</h2>
  <div class="grid">
    <img src="images/cake1.jpg" alt="Cake">
    <img src="images/cake2.jpg" alt="Cake">
    <img src="images/cake3.jpg" alt="Cake">
  </div>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>
  <p>Email: hello@sweetcrumbs.com</p>
  <p>Instagram: @sweetcrumbs</p>
</section>

<footer>
  <p>© 2026 Sweet Crumbs Bakery</p>
</footer>

</body>
</html>
